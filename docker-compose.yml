services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rahnuma-postgres
    environment:
      POSTGRES_USER: rahnuma
      POSTGRES_PASSWORD: rahnuma_dev
      POSTGRES_DB: rahnuma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rahnuma"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
